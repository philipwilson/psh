  stderr: ""
  exit_code: 0

# =============================================================================
# SUBSHELL STATE INHERITANCE (reappraisal #15 E1: ShellState.adopt())
# =============================================================================
# $0, FUNCNAME, traps, source context, getopts cursor, SECONDS and the
# directory stack must survive into ( ) / $( ) / <( ) children.
# NOTE: $0 defaults to the shell's own name ("psh" vs "bash"), so the
# $0 cases here are psh_only; the bash equivalence was probed with an
# explicit name argument (tmp/e1_truth_table.sh, c-mode-$0-named).

- name: subshell_inherits_dollar_zero
  command: "(echo $0); echo $(echo $0)"
  stdout: "psh\npsh\n"
  stderr: ""
  exit_code: 0
  psh_only: true

- name: subshell_inherits_funcname
  command: 'f() { (echo "sub=${FUNCNAME[0]}"); echo "cs=$(echo ${FUNCNAME[0]})"; }; f'
  stdout: "sub=f\ncs=f\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_lists_parent_traps_saved_idiom
  command: 'trap "echo hi" USR1; saved=$(trap); echo "[$saved]"'
  stdout: "[trap -- 'echo hi' SIGUSR1]\n"
  stderr: ""
  exit_code: 0

- name: subshell_trap_modification_drops_inherited_keeps_ignored
  command: 'trap "echo A" USR1; trap "" USR2; (trap "echo C" TERM; trap)'
  stdout: "trap -- 'echo C' SIGTERM\ntrap -- '' SIGUSR2\n"
  stderr: ""
  exit_code: 0

- name: procsub_does_not_list_parent_traps
  command: 'trap "echo hi" USR1; cat <(trap); echo done'
  stdout: "done\n"
  stderr: ""
  exit_code: 0

- name: parent_exit_trap_not_fired_at_subshell_exit
  command: 'trap "echo pexit" EXIT; (echo sub); echo done'
  stdout: "sub\ndone\npexit\n"
  stderr: ""
  exit_code: 0

- name: subshell_own_exit_trap_fires
  command: '(trap "echo cexit" EXIT; echo body); echo after'
  stdout: "body\ncexit\nafter\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_own_exit_trap_fires
  command: 'x=$(trap "echo bye" EXIT; echo inner); echo "x=[$x]"'
  stdout: "x=[inner\nbye]\n"
  stderr: ""
  exit_code: 0

- name: seconds_baseline_inherited_by_subshell
  command: "SECONDS=500; (echo $SECONDS)"
  stdout: "500\n"
  stderr: ""
  exit_code: 0

- name: getopts_cluster_cursor_continues_in_cmdsub
  command: 'set -- -ab; getopts ab o; echo "first=$o"; echo "sub=$(getopts ab o; echo $o)"'
  stdout: "first=a\nsub=b\n"
  stderr: ""
  exit_code: 0

- name: dirs_in_subshell_sees_parent_stack
  command: "cd /; pushd /tmp >/dev/null; (dirs)"
  stdout: "/tmp /\n"
  stderr: ""
  exit_code: 0

- name: return_in_subshell_of_function
  command: "f() { (return 5); echo in=$?; }; f"
  stdout: "in=5\n"
  stderr: ""
  exit_code: 0

- name: trap_listing_order_matches_bash
  command: "trap : EXIT; trap : DEBUG; trap : ERR; trap : USR1; trap : HUP; trap -p"
  stdout: "trap -- ':' EXIT\ntrap -- ':' SIGHUP\ntrap -- ':' SIGUSR1\ntrap -- ':' DEBUG\ntrap -- ':' ERR\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# DECLARE -F ROUND TRIP (reappraisal #15, D3) — `src=$(declare -f f);
# unset -f f; eval "$src"` must rebuild the same function. The old duplicate
# formatter crashed on case arms and dropped heredoc bodies and
# definition-attached redirects.
# =============================================================================

- name: declare_f_roundtrip_case_arm
  command: 'f() { case $1 in a|b) echo AB;; *) echo O;; esac; }; src=$(declare -f f); unset -f f; eval "$src"; f a; f z'
  stdout: "AB\nO\n"
  stderr: ""
  exit_code: 0

- name: declare_f_roundtrip_heredoc_body
  command: "f() { x=world; cat <<EOF\nhello $x\nEOF\n}\nsrc=$(declare -f f); unset -f f; eval \"$src\"; f"
  stdout: "hello world\n"
  stderr: ""
  exit_code: 0

- name: declare_f_roundtrip_quoted_heredoc_delim
  command: "f() { cat <<'EOF'\nliteral $x\nEOF\n}\nsrc=$(declare -f f); unset -f f; eval \"$src\"; f"
  stdout: "literal $x\n"
  stderr: ""
  exit_code: 0

- name: type_function_with_case_no_crash
  command: 'f() { case $1 in a) echo A;; esac; }; type f >/dev/null 2>&1; echo rc=$?'
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# READ REMAINDER — last variable gets the raw rest of the line (appraisal #15 B4)
# =============================================================================

- name: read_remainder_preserves_interior_whitespace
  command: "printf '  a  b  c \\n' | { read x y; echo \"[$x][$y]\"; }"
  stdout: "[a][b  c]\n"
  stderr: ""
  exit_code: 0

- name: read_remainder_keeps_trailing_double_delim
  command: "printf 'x:y::\\n' | { IFS=: read a b; echo \"[$a][$b]\"; }"
  stdout: "[x][y::]\n"
  stderr: ""
  exit_code: 0

- name: read_remainder_drops_single_trailing_delim
  command: "printf 'x:y:\\n' | { IFS=: read a b; echo \"[$a][$b]\"; }"
  stdout: "[x][y]\n"
  stderr: ""
  exit_code: 0

- name: read_remainder_single_var_drops_lone_trailing_delim
  command: "printf 'x:\\n' | { IFS=: read a; echo \"[$a]\"; }"
  stdout: "[x]\n"
  stderr: ""
  exit_code: 0

- name: read_remainder_mixed_ifs_verbatim
  command: "printf 'a  :  b  :  c\\n' | { IFS=': ' read x y; echo \"[$x][$y]\"; }"
  stdout: "[a][b  :  c]\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# REAPPRAISAL #15 CLUSTER H — evaluation engines
# =============================================================================

# H1: [[ ]] numeric operators run full arithmetic on their operands.
- name: dstest_eq_evaluates_arithmetic
  command: "[[ 1+1 -eq 2 ]]; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: dstest_eq_recursive_name_resolution
  command: "y=5; x=y; [[ x -eq 5 ]]; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: dstest_eq_bad_octal_status_1_continues
  command: "[[ 08 -eq 8 ]]; echo rc=$?"
  stdout: "rc=1\n"
  stderr: "value too great for base"
  exit_code: 0

- name: test_builtin_does_not_evaluate_arithmetic
  command: "[ 1+1 -eq 2 ]; echo rc=$?"
  stdout: "rc=2\n"
  stderr: "integer expression expected"
  exit_code: 0

# H2: bracket sets that cannot compile match quietly (never crash).
- name: dstest_reversed_range_no_match
  command: "[[ b == [z-a] ]]; echo rc=$?"
  stdout: "rc=1\n"
  stderr: ""
  exit_code: 0

- name: dstest_negated_reversed_range_matches_any
  command: "[[ b == [!z-a] ]]; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: dstest_escaped_rbracket_in_set
  command: "[[ \"]\" == [a\\]b] ]]; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: case_reversed_range_falls_through
  command: "case b in [z-a]) echo m;; *) echo n;; esac"
  stdout: "n\n"
  stderr: ""
  exit_code: 0

# H3: arithmetic / and % use pure integer math with C sign semantics.
- name: arith_int64_division_precision
  command: "echo $((9223372036854775807 / 3))"
  stdout: "3074457345618258602\n"
  stderr: ""
  exit_code: 0

- name: arith_division_c_sign_semantics
  command: "echo $((-7/2)) $((-7%2)) $((7/-2)) $((7%-2))"
  stdout: "-3 -1 -3 1\n"
  stderr: ""
  exit_code: 0

# MED: array-subscript arithmetic errors are fatal, never index 0.
- name: array_write_bad_base_subscript_fatal
  command: "a=(x y z w); a[08]=Q; echo rc=$? \"${a[@]}\""
  stdout: ""
  stderr: "value too great for base"
  exit_code: 1

- name: array_read_bad_base_subscript_fatal
  command: "a=(x y z); echo \"${a[08]}\"; echo rc=$?"
  stdout: ""
  stderr: "value too great for base"
  exit_code: 1

- name: array_unset_name_subscript_addresses_zero
  command: "unset junk; a=(x y z); a[junk]=Q; echo rc=$? \"${a[@]}\""
  stdout: "rc=0 Q y z\n"
  stderr: ""
  exit_code: 0

# H5 (reappraisal #16): an integer literal >= 2**63 wraps to signed 64-bit
# exactly like an operation result, at every arithmetic site.
- name: arith_literal_wraps_signed64
  command: "echo $((9223372036854775808))"
  stdout: "-9223372036854775808\n"
  stderr: ""
  exit_code: 0

- name: arith_literal_hex_wraps_signed64
  command: "echo $((0x8000000000000000))"
  stdout: "-9223372036854775808\n"
  stderr: ""
  exit_code: 0

- name: arith_assigned_literal_wraps_signed64
  command: "x=9223372036854775808; echo $((x))"
  stdout: "-9223372036854775808\n"
  stderr: ""
  exit_code: 0

- name: arith_literal_2pow64_is_zero
  command: "echo $((18446744073709551616))"
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: test_eq_huge_literal_wraps_to_negative
  command: "[[ 9223372036854775808 -eq -9223372036854775808 ]] && echo Y || echo N"
  stdout: "Y\n"
  stderr: ""
  exit_code: 0

- name: array_write_huge_subscript_wraps_bad_subscript
  command: "a[9223372036854775808]=z; echo rc=$?"
  stdout: ""
  stderr: "bad array subscript"
  exit_code: 1

# MED (reappraisal #16): a negative shift count is masked to 6 bits (bash / C
# on x86-64), NOT an error. `1 << -1` == `1 << 63`.
- name: arith_negative_left_shift_masks
  command: "echo $((1 << -1))"
  stdout: "-9223372036854775808\n"
  stderr: ""
  exit_code: 0

- name: arith_negative_right_shift_masks
  command: "echo $((256 >> -1))"
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: arith_negative_shift_wraps_to_identity
  command: "echo $((1 << -64))"
  stdout: "1\n"
  stderr: ""
  exit_code: 0

# MED (reappraisal #16): a base#n literal with an out-of-range digit is a
