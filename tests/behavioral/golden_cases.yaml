  stderr: ""
  exit_code: 0

# =============================================================================
# ARITHMETIC EXPANSION
# =============================================================================

- name: arith_basic_add
  command: 'echo $((1 + 2))'
  stdout: "3\n"
  stderr: ""
  exit_code: 0

- name: arith_multiply
  command: 'echo $((6 * 7))'
  stdout: "42\n"
  stderr: ""
  exit_code: 0

- name: arith_with_variable
  command: 'x=10; echo $((x + 5))'
  stdout: "15\n"
  stderr: ""
  exit_code: 0

- name: arith_nested_parens
  command: 'echo $(( (2 + 3) * 4 ))'
  stdout: "20\n"
  stderr: ""
  exit_code: 0

- name: arith_modulo
  command: 'echo $((17 % 5))'
  stdout: "2\n"
  stderr: ""
  exit_code: 0

- name: arith_comparison_true
  command: 'echo $((3 > 2))'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

- name: arith_comparison_false
  command: 'echo $((3 < 2))'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: arith_ternary
  command: 'x=5; echo $(( x > 3 ? 1 : 0 ))'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

- name: arith_increment
  command: 'x=5; echo $((x + 1)) $((x))'
  stdout: "6 5\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_read
  command: 'declare -A m; m[k]=9; echo $(( m[k] ))'
  stdout: "9\n"
  stderr: ""
  exit_code: 0

# POSIX `$((` disambiguation (reappraisal #15 A4): arithmetic only when a
# matching `))` closes it; otherwise re-read as `$(` command substitution
# whose body starts with a subshell.
- name: arith_fallback_subshell_cmdsub
  command: 'echo $((echo a); echo b)'
  stdout: "a b\n"
  stderr: ""
  exit_code: 0

- name: arith_fallback_pipeline
  command: 'echo $((echo one two) | wc -w)'
  stdout: null
  stderr: ""
  exit_code: 0

- name: arith_fallback_in_double_quotes
  command: 'echo "$((echo a); echo b)"'
  stdout: "a\nb\n"
  stderr: ""
  exit_code: 0

- name: arith_fallback_in_assignment
  command: 'x=$((echo u); echo host); echo $x'
  stdout: "u host\n"
  stderr: ""
  exit_code: 0

- name: arith_fallback_nested_cmdsub
  command: 'echo $(echo $((echo a); echo b))'
  stdout: "a b\n"
  stderr: ""
  exit_code: 0

- name: arith_fallback_param_default
  command: 'unset v; echo "${v:-$((echo a); echo b)}"'
  stdout: "a\nb\n"
  stderr: ""
  exit_code: 0

- name: arith_fallback_array_subscript
  command: 'unset a; a[$((echo 3) )]=v; echo ${a[3]}'
  stdout: "v\n"
  stderr: ""
  exit_code: 0

- name: arith_matching_parens_stay_arithmetic
  command: 'echo $((ls)) $(( (1+2) * 3 )) $(( $((1+1)) + 1 ))'
  stdout: "0 9 3\n"
  stderr: ""
  exit_code: 0

- name: arith_explicit_space_subshell_form
  command: 'echo $( (echo x) )'
  stdout: "x\n"
  stderr: ""
  exit_code: 0

# Command/loop arithmetic forms reconstruct expression text token-by-token and
# must re-add the '$' the lexer strips from VARIABLE tokens (appraisal H2).
- name: arith_command_form_positional
  command: 'set -- 5; (( $1 == 5 )) && echo Y || echo N'
  stdout: "Y\n"
  stderr: ""
  exit_code: 0

- name: arith_command_form_array_length
  command: 'arr=(a b c); (( ${#arr[@]} > 0 )) && echo y || echo n'
  stdout: "y\n"
  stderr: ""
  exit_code: 0

- name: arith_cstyle_for_array_length_bound
  command: 'arr=(x y z); for ((i=0;i<${#arr[@]};i++)); do printf "%s " "${arr[i]}"; done; echo'
  stdout: "x y z \n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_increment_uses_key_value
  command: 'declare -A c; w=foo; ((c[$w]++)); ((c[$w]++)); echo "${!c[@]}=${c[foo]}"'
  stdout: "foo=2\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_in_expr
  command: 'declare -A m; m[k]=9; echo $(( m[k] * 2 ))'
  stdout: "18\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_literal_key
  command: 'declare -A m; m[k]=9; m[a]=99; a=k; echo $(( m[a] ))'
  stdout: "99\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_compound_assign
  command: 'declare -A m; m[k]=2; (( m[k] += 5 )); echo "${m[k]}"'
  stdout: "7\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_new_key_assign
  command: 'declare -A m; (( m[new]=5 )); echo "${m[new]}"'
  stdout: "5\n"
  stderr: ""
  exit_code: 0

- name: arith_indexed_array_post_increment
  command: 'a=(4); echo $(( a[0]++ )); echo "${a[0]}"'
  stdout: "4\n5\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_post_increment
  command: 'declare -A m; m[x]=4; echo $(( m[x]++ )); echo "${m[x]}"'
  stdout: "4\n5\n"
  stderr: ""
  exit_code: 0

- name: arith_assoc_array_pre_decrement
  command: 'declare -A m; m[x]=4; echo $(( --m[x] )); echo "${m[x]}"'
  stdout: "3\n3\n"
  stderr: ""
  exit_code: 0

# --- negative subscript on indexed-array WRITES (M4, reappraisal #6) ---
# bash maps -N to (highest_index + 1) - N: -1 = last, -2 = second-to-last.

- name: array_neg_index_write_last
  command: 'a=(1 2 3); a[-1]=X; echo "${a[2]}" "${a[-1]}"'
  stdout: "X X\n"
  stderr: ""
  exit_code: 0

- name: array_neg_index_write_middle
  command: 'a=(1 2 3); a[-2]=Y; echo "${a[1]}"'
  stdout: "Y\n"
  stderr: ""
  exit_code: 0

- name: array_neg_index_append
  command: 'a=(1 2 3); a[-1]+=Q; echo "${a[2]}"'
  stdout: "3Q\n"
  stderr: ""
  exit_code: 0

- name: array_neg_index_arithmetic_assign
  command: 'a=(1 2 3); (( a[-1]=9 )); echo "${a[2]}"'
  stdout: "9\n"
  stderr: ""
  exit_code: 0

- name: array_neg_index_out_of_range
  command: 'a=(1 2 3); a[-4]=W; echo "${a[0]}"'
  stderr: "bad array subscript"
  exit_code: 1

# --- integer (-i) array element assignment evaluates RHS arithmetically ---

- name: integer_array_element_evaluates_rhs
  command: 'declare -ia v; v[0]=2+3; v[1]=4*2; echo "${v[0]}" "${v[1]}"'
  stdout: "5 8\n"
  stderr: ""
  exit_code: 0

- name: integer_array_element_append_numeric
  command: 'declare -ia v; v[0]=10; v[0]+=2*3; echo "${v[0]}"'
  stdout: "16\n"
  stderr: ""
  exit_code: 0

- name: non_integer_array_element_literal
  command: 'a=(); a[0]=2+3; echo "${a[0]}"'
  stdout: "2+3\n"
  stderr: ""
  exit_code: 0

# --- separate-bracket "array assignment" is NOT an assignment (matches bash) ---
# `a [ 0 ] = v` (space BEFORE the bracket) is a simple command: word `a`
# followed by args `[ 0 ] = v`. bash runs `a` and reports command-not-found.
- name: array_separate_bracket_command_not_found
  command: 'a [ 0 ] = v'
  stdout: ""
  stderr: "command not found"
  exit_code: 127

- name: array_separate_bracket_append_command_not_found
  command: 'arr [ key ] += val'
  stdout: ""
  stderr: "command not found"
  exit_code: 127

# A real command named like an identifier, followed by `[ ... ]` args, must
# run normally -- the old machinery misdetected this as an array assignment.
- name: array_separate_bracket_real_command_runs
  command: 'echo [ 0 ] = v'
  stdout: "[ 0 ] = v\n"
  stderr: ""
  exit_code: 0

- name: array_separate_bracket_function_runs
  command: 'a() { echo hi "$@"; }; a [ 0 ] = v'
  stdout: "hi [ 0 ] = v\n"
  stderr: ""
  exit_code: 0

# Valid (no-space) array assignment is unaffected.
- name: array_element_no_space_still_works
  command: 'a[0]=v; echo "${a[0]}"'
  stdout: "v\n"
  stderr: ""
  exit_code: 0

- name: array_element_spaces_inside_brackets_still_works
  command: 'a[ 0 ]=v; echo "${a[0]}"'
  stdout: "v\n"
  stderr: ""
  exit_code: 0

