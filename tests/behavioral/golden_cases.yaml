# R18 TIER-2 (T2-A): arithmetic / eval error-path edges
# =============================================================================

# Compound assignment reads the LHS BEFORE evaluating the RHS (bash): an
# embedded ++/-- of the same variable in the RHS does not feed back into the
# left-operand read.
- name: r18t2_arith_compound_reads_lhs_first
  command: "c=1; echo $((c+=c++))"
