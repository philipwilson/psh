  command: "test -9223372036854775808 -lt 5; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: bracket_int_over_max_rejected
  command: "[ 9223372036854775808 -gt 5 ]; echo rc=$?"
