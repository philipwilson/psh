  stdout: "[x1][x2]"
  stderr: ""
  exit_code: 0

- name: prefix_names_quoted_star_single_field
  command: 'x1=a; x2=b; printf "[%s]" "${!x*}"'
  stdout: "[x1 x2]"
  stderr: ""
  exit_code: 0

- name: prefix_names_no_match_no_fields
  command: 'set -- "${!zzzqqq@}"; echo $#'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: param_suffix_strip
  command: 'file=archive.tar.gz; echo ${file%.*}'
  stdout: "archive.tar\n"
  stderr: ""
  exit_code: 0

- name: param_suffix_strip_greedy
  command: 'file=archive.tar.gz; echo ${file%%.*}'
  stdout: "archive\n"
  stderr: ""
  exit_code: 0

- name: param_substitution
  command: 'var=hello; echo ${var/ell/ELL}'
  stdout: "hELLo\n"
  stderr: ""
  exit_code: 0

- name: param_substitution_global
  command: 'var=banana; echo ${var//a/A}'
  stdout: "bAnAnA\n"
  stderr: ""
  exit_code: 0

# extglob alternation is leftmost-LONGEST (POSIX), not leftmost-match — see
# reappraisal #16 follow-up (f). Python re alternation picks the first
# alternative that lets the match succeed; bash picks the longest.
- name: extglob_alt_leftmost_longest_prefix
  command: 'shopt -s extglob; v=aaX; echo "${v/#@(a|aa)/Z}"'
  stdout: "ZX\n"
  stderr: ""
  exit_code: 0

- name: extglob_alt_leftmost_longest_first
  command: 'shopt -s extglob; v=aaX; echo "${v/@(a|aa)/Z}"'
  stdout: "ZX\n"
  stderr: ""
  exit_code: 0

- name: extglob_alt_leftmost_longest_all
  command: 'shopt -s extglob; v=aaXaa; echo "${v//@(a|aa)/Z}"'
  stdout: "ZXZ\n"
  stderr: ""
  exit_code: 0

- name: extglob_alt_backtrack_forced_by_trailing_literal
  command: 'shopt -s extglob; v=abb; echo "${v/#@(a|ab)b/Z}"'
  stdout: "Z\n"
  stderr: ""
  exit_code: 0

- name: extglob_nested_alt_leftmost_longest
  command: 'shopt -s extglob; v=bbX; echo "${v/@(a|@(b|bb))/Z}"'
  stdout: "ZX\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# WORD SPLITTING
# =============================================================================

- name: word_split_unquoted_variable
  command: 'var="a   b   c"; echo $var'
  stdout: "a b c\n"
  stderr: ""
  exit_code: 0

- name: word_split_suppressed_in_quotes
  command: 'var="a   b   c"; echo "$var"'
  stdout: "a   b   c\n"
  stderr: ""
  exit_code: 0

- name: custom_ifs_splitting
  command: 'IFS=:; var="a:b:c"; echo $var'
  stdout: "a b c\n"
  stderr: ""
  exit_code: 0

- name: ifs_empty_no_split
  command: 'IFS=; var="a b c"; echo $var'
  stdout: "a b c\n"
  stderr: ""
  exit_code: 0

- name: word_split_multiple_spaces
  command: 'var="one  two  three"; printf "[%s]\n" $var'
  stdout: "[one]\n[two]\n[three]\n"
  stderr: ""
  exit_code: 0

# IFS is seeded as a REAL variable (default <space><tab><newline>), so it can
# be read, tested, and round-tripped (H3, reappraisal #16).
- name: ifs_default_length
  command: 'echo ${#IFS}'
  stdout: "3\n"
  stderr: ""
  exit_code: 0

# The seeded default really contains tab and newline (not three spaces):
# splitting on default IFS breaks a tab/newline-delimited value into 3 fields.
- name: ifs_default_splits_tab_and_newline
  command: 'x=$(printf "a\tb\nc"); set -- $x; echo $#'
  stdout: "3\n"
  stderr: ""
  exit_code: 0

- name: ifs_plus_set_test
  command: 'echo "${IFS+set}"'
  stdout: "set\n"
  stderr: ""
  exit_code: 0

- name: ifs_save_restore_idiom
  command: 'OLD=$IFS; IFS=,; v="a,b,c"; set -- $v; echo $2; IFS=$OLD; x="p q r"; for w in $x; do echo "[$w]"; done'
  stdout: "b\n[p]\n[q]\n[r]\n"
  stderr: ""
  exit_code: 0

- name: ifs_roundtrip_restores_default_split
  command: 'OLD=$IFS; IFS=:; IFS=$OLD; set -- $(echo "a b c"); echo $#'
  stdout: "3\n"
  stderr: ""
  exit_code: 0

- name: ifs_unset_falls_back_to_whitespace
  command: 'unset IFS; set -- $(echo "p q r"); echo $#; echo $2'
  stdout: "3\nq\n"
  stderr: ""
  exit_code: 0

