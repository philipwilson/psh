# trap POSIX numeric forms (0 == EXIT; leading number = reset) and full
# signal-name coverage (reappraisal #15 F2). Only platform-stable signal
# numbers (2=INT, 15=TERM) appear literally.
- name: trap_zero_sets_exit_trap
  command: "trap 'echo bye' 0; echo rc=$?"
  stdout: "rc=0\nbye\n"
  stderr: ""
  exit_code: 0

- name: trap_zero_alone_resets_exit_trap
