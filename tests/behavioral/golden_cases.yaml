# Ledger #16 (c): arithmetic number literals read a whole [0-9a-zA-Z@_] token
# and error "value too great for base" on a digit invalid for the base
# (hex/octal/decimal alike), instead of stopping at the bad digit and leaving
# a stray trailing token. A bare 0x/0X (no hex digits) is 0.
- name: arith_hex_plain
  command: "echo $((0xff))"
  stdout: "255\n"
