# DELIBERATE DIVERGENCE (psh_only): bash's integer-array `+=` prefix onto an
# external command is buggy — it emits a garbled "operand expected" syntax
# error (a control character leaks into its exported form) and returns 1. psh
# does the sane thing: serialize element 0's scalar view into the environment,
# run the command (rc 0), and restore the array to (1 2 3).
- name: exec_p1a_prefix_int_array_append_sane
  command: "declare -ai a=(1 2 3); a+=10 /usr/bin/true; echo \"rc=$?\"; declare -p a"
  stdout: "rc=0\ndeclare -ai a=([0]=\"1\" [1]=\"2\" [2]=\"3\")\n"
  stderr: ""
  exit_code: 0
  psh_only: true

