  stderr: ""
  exit_code: 0

- name: extglob_negation_prefix_removal
  command: "shopt -s extglob; v=xfooxER; echo \"${v#x!(o)x}\""
  stdout: "ER\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# LOOP-CONTROL SCOPE BOUNDARY — break/continue/return don't cross function or
# pipeline-subshell scope (appraisal H3/H4). stderr wording differs by shell
# (separate finding), so these pin stdout + exit code only.
# =============================================================================

- name: break_in_function_does_not_break_caller_loop
  command: "f() { break; }; for i in 1 2 3; do echo $i; f; done; echo end"
  stdout: "1\n2\n3\nend\n"
  stderr: "break: only meaningful"
  exit_code: 0

- name: break_level_in_function_loop_stays_in_function
  command: "f(){ for j in a b; do break 2; done; }; for i in 1 2 3; do f; echo $i; done; echo end"
  stdout: "1\n2\n3\nend\n"
  exit_code: 0

- name: return_in_pipelined_while_exits_subshell
  command: "f() { echo a | while read x; do return 5; done; echo \"after=$?\"; }; f"
  stdout: "after=5\n"
  exit_code: 0

- name: break_level_in_pipelined_while_no_leak
  command: "for i in 1 2; do echo x | while read y; do break 2; done; echo i=$i; done"
  stdout: "i=1\ni=2\n"
  exit_code: 0

# =============================================================================
# DECLARATION FLAGS — readonly -a/-A, export -f (appraisal H6/H7)
# =============================================================================

- name: readonly_indexed_array
  command: "readonly -a arr=(1 2 3); echo \"${arr[@]}\""
  stdout: "1 2 3\n"
  stderr: ""
  exit_code: 0

- name: readonly_associative_array
  command: "readonly -A m=([k]=v); echo \"${m[k]}\""
  stdout: "v\n"
  stderr: ""
  exit_code: 0

- name: readonly_array_declare_p
  command: "readonly -a arr=(x y); declare -p arr"
  stdout: "declare -ar arr=([0]=\"x\" [1]=\"y\")\n"
  stderr: ""
  exit_code: 0

- name: export_function_succeeds
  command: "myfn() { echo hi; }; export -f myfn; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: export_function_nonexistent_is_error
  command: "export -f nope; echo rc=$?"
  stdout: "rc=1\n"
  stderr: "not a function"
  exit_code: 0

# =============================================================================
# BUILTIN/ARRAY CORRECTNESS (appraisal Tier 3: read -p, declare -i, unset arr[@])
# =============================================================================

- name: read_p_no_prompt_from_pipe
  command: "echo data | { read -p 'PROMPT: ' x; echo \"[$x]\"; }"
  stdout: "[data]\n"
  stderr: ""
  exit_code: 0

- name: declare_integer_first_array_element
  command: "declare -i a; a[0]=2+3; a[1]=4*2; echo \"${a[@]}\""
  stdout: "5 8\n"
  stderr: ""
  exit_code: 0

- name: unset_indexed_array_at
  command: "arr=(1 2 3); unset 'arr[@]'; echo \"n=${#arr[@]}\""
  stdout: "n=0\n"
  stderr: ""
  exit_code: 0

- name: unset_assoc_at_is_literal_key
  command: "declare -A m=([a]=1 [b]=2); unset 'm[@]'; echo \"n=${#m[@]}\""
  stdout: "n=2\n"
  stderr: ""
  exit_code: 0

- name: dollar_bracket_arithmetic
  command: "echo $[1+2] $[2*$[3]]"
  stdout: "3 6\n"
  stderr: ""
  exit_code: 0

# Backgrounded assignment runs in a subshell; DEBUG trap before loops/case (Tier 3 M4/M5)
- name: backgrounded_assignment_subshell
  command: "x=5 & wait; echo \"x=[$x]\""
  stdout: "x=[]\n"
  stderr: ""
  exit_code: 0

- name: debug_trap_before_for_iterations
  command: "trap 'echo D' DEBUG; for i in 1 2; do echo x; done"
  stdout: "D\nD\nx\nD\nD\nx\n"
  stderr: ""
  exit_code: 0

- name: debug_trap_before_case
  command: "trap 'echo D' DEBUG; case x in x) echo c;; esac"
  stdout: "D\nD\nc\n"
  stderr: ""
  exit_code: 0

- name: explicit_fd_heredoc_no_self_close
  command: "cat 3<<EOF <&3\nfd3body\nEOF"
  stdout: "fd3body\n"
  stderr: ""
  exit_code: 0

- name: funcname_caller_in_array
  command: "outer(){ inner; }; inner(){ echo \"${FUNCNAME[0]}<-${FUNCNAME[1]}\"; }; outer"
  stdout: "inner<-outer\n"
  stderr: ""
  exit_code: 0

# Prompt-style $-expansion (Tier 3 M12): PS1/PS2 render via the same expand_full
# path as ${var@P}, bash's promptvars. Pinned here through @P (bash-comparable;
# the live PS1/PS2 render is interactive-only and covered by unit tests).
- name: promptvars_var_and_command_sub
  command: "FOO=barval; PS=\"[\\$FOO-\\$(echo CMD)]\"; echo \"${PS@P}\""
  stdout: "[barval-CMD]\n"
  stderr: ""
  exit_code: 0

- name: promptvars_arithmetic
  command: "X=\"\\$((2+3))\"; echo \"${X@P}\""
  stdout: "5\n"
  stderr: ""
  exit_code: 0

# Heredoc inside process substitution (Tier 3 M8): the whole <(...) spans
# multiple lines and contains a <<EOF whose body must stay nested.
- name: heredoc_inside_process_substitution
  command: "cat <(cat <<EOF\nhello\nEOF\n)"
  stdout: "hello\n"
  stderr: ""
  exit_code: 0

- name: heredoc_inside_process_substitution_filtered
  command: "cat <(sort <<EOF\n3\n1\n2\nEOF\n)"
  stdout: "1\n2\n3\n"
  stderr: ""
  exit_code: 0

# Named file descriptors {varname}>... (Tier 3 M2). bash allocates a free
# fd >= 10 into the variable; persists for non-forked commands, child-local
# for external/subshell; {NAME}> only at word-start with a valid identifier.
- name: named_fd_exec_allocates_ge_10
  command: "exec {fd}>/dev/null; echo \"$fd\""
  stdout: "10\n"
  stderr: ""
  exit_code: 0

- name: named_fd_builtin_persists_in_parent
  command: "true {fd}>/dev/null; echo \"[$fd]\""
  stdout: "[10]\n"
  stderr: ""
  exit_code: 0

- name: named_fd_external_does_not_set_parent_var
  command: "cat </dev/null {fd}>/dev/null; echo \"[$fd]\""
  stdout: "[]\n"
  stderr: ""
  exit_code: 0

- name: named_fd_close_keeps_var_value
  command: "exec {fd}>/dev/null; exec {fd}>&-; echo \"[$fd]\""
  stdout: "[10]\n"
  stderr: ""
  exit_code: 0

- name: named_fd_lone_brace_word_is_literal
  command: "echo {fd}"
  stdout: "{fd}\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# STATEMENT BOUNDARIES (reappraisal #15 A1+A3): a statement must end at a
# separator/terminator, and '&' backgrounds the whole and-or list
# =============================================================================

- name: missing_separator_paren_rejected
  command: "echo (ls)"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: missing_separator_assignment_subshell_rejected
  command: "x=1 (echo sub)"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: missing_separator_in_then_body_rejected
  command: "if true; then echo hi (uname); fi"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: missing_separator_adjacent_groups_rejected
  command: "(echo a)(echo b)"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: group_ampersand_then_pipe_rejected
  command: "(echo a) & | cat"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: ampersand_then_semicolon_rejected
  command: "echo a & ; echo b"
  stdout: ""
  stderr: "syntax error near unexpected token"
  exit_code: 2

- name: andor_list_of_groups_backgrounds_whole_list
  command: "(sleep 0.3; echo a) && (echo b) & echo fg; wait"
  stdout: "fg\na\nb\n"
  stderr: ""
  exit_code: 0

- name: case_body_ampersand_terminator_allowed
  command: "case x in x) echo a & ;; esac; wait"
  stdout: "a\n"
  stderr: ""
  exit_code: 0
