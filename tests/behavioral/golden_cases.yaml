  stdout: "y\n"
  stderr: ""
  exit_code: 0

- name: extglob_embedded_negation_reject
  command: "shopt -s extglob; [[ xox == x!(o)x ]] && echo y || echo n"
  stdout: "n\n"
  stderr: ""
  exit_code: 0

