  exit_code: 127

- name: param_alternative
  command: 'x=value; echo ${x:+replaced}'
  stdout: "replaced\n"
  stderr: ""
  exit_code: 0

- name: param_alternative_empty
  command: 'echo ${x:+replaced}'
  stdout: "\n"
  stderr: ""
  exit_code: 0

- name: param_length
  command: 'var=hello; echo ${#var}'
  stdout: "5\n"
  stderr: ""
  exit_code: 0

- name: param_prefix_strip
  command: 'path=/usr/local/bin; echo ${path#*/}'
