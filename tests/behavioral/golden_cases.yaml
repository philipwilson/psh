  stdout: ""
  stderr: "value too great for base"
  exit_code: 1

- name: arith_decimal_trailing_letter_value_too_great
  command: "echo $((5a))"
  stdout: ""
  stderr: "value too great for base"
  exit_code: 1

# Ledger #16 (d): test/[ integer operands are signed 64-bit (intmax_t); a
