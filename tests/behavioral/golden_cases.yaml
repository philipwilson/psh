# (b) globstar ** does not descend through symlinked dirs (bash 4.3+);
# a symlink loop (loop -> .) must terminate, with the link listed once.
- name: globstar_symlink_no_traverse
  command: 'cd "$(mktemp -d)" && mkdir -p sub/deep && touch a.txt sub/x.txt sub/deep/z.txt && ln -s sub symdir && ln -s . loop && shopt -s globstar && echo **'
  stdout: "a.txt loop sub sub/deep sub/deep/z.txt sub/x.txt symdir\n"
  stderr: ""
  exit_code: 0

- name: globstar_symlink_prefix_excluded
  command: 'cd "$(mktemp -d)" && mkdir -p sub/deep && touch a.txt sub/x.txt sub/deep/z.txt && ln -s sub symdir && ln -s . loop && shopt -s globstar && echo **/*.txt'
  stdout: "a.txt sub/deep/z.txt sub/x.txt\n"
  stderr: ""
  exit_code: 0

- name: globstar_explicit_symlink_followed
  command: 'cd "$(mktemp -d)" && mkdir -p sub/deep && touch sub/x.txt sub/deep/z.txt && ln -s sub symdir && shopt -s globstar && echo symdir/**'
  stdout: "symdir/ symdir/deep symdir/deep/z.txt symdir/x.txt\n"
  stderr: ""
  exit_code: 0

- name: globstar_trailing_slash_dirs_only
  command: 'cd "$(mktemp -d)" && mkdir -p sub/deep && touch a.txt sub/x.txt && ln -s sub symdir && shopt -s globstar && echo **/'
  stdout: "sub/ sub/deep/ symdir/\n"
  stderr: ""
  exit_code: 0

