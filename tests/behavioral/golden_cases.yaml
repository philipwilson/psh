- name: enhanced_test_pattern
  command: '[[ "hello" == h* ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

# Per-part quoting in [[ ]] (T3.1): the QUOTED '?' is a literal '?', not a
# glob, while the unquoted 'ab' stays plain — a single quote flag could not
# express this.
- name: enhanced_test_per_part_quoted_metachar
  command: '[[ abc == ab"?" ]]; echo $?'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_per_part_mixed_pattern
  command: '[[ abc == a"b"* ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

# Per-part quoting in =~: the quoted '.' is a literal dot, the unquoted
# 'a'/'c' are live regex.
- name: enhanced_test_regex_per_part_literal_dot
  command: '[[ "axc" =~ a"."c ]]; echo $?'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

# A backslash inside double quotes stays literal (quote-aware quote removal,
# not blanket backslash stripping).
- name: enhanced_test_dquote_backslash_literal
  command: '[[ "a\.c" == "a\.c" ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

# Extended-glob patterns work UNCONDITIONALLY in a [[ ]] ==/!= operand
# (bash interprets @(...) ?(...) *(...) +(...) !(...) there regardless of the
# `extglob` shopt). None of these enable extglob, pinning the unconditional
# behavior.
- name: enhanced_test_extglob_at_match
  command: '[[ abc == a@(b|x)c ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_extglob_at_nomatch
  command: '[[ ayc == a@(b|x)c ]]; echo $?'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_extglob_bang
  command: '[[ abc == a!(z)c ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_extglob_plus
  command: '[[ aXXc == a+(X)c ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_extglob_trailing_glob
  command: '[[ foobar == @(foo|bar)* ]]; echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0

- name: enhanced_test_extglob_quoted_literal
  command: '[[ abc == "a@(b|x)c" ]]; echo $?'
  stdout: "1\n"
  stderr: ""
  exit_code: 0

