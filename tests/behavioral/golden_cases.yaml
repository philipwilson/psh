  stderr: ""
  exit_code: 0

- name: star_view_subst_anchored_prefix_per_element
  command: 'set -- abc abd; echo "${*/#ab/X}"'
  stdout: "Xc Xd\n"
  stderr: ""
  exit_code: 0

- name: star_view_subst_anchored_suffix_per_element
  command: 'set -- abc abd; echo "${*/%bc/Y}"'
  stdout: "aY abd\n"
  stderr: ""
  exit_code: 0

- name: star_view_subst_never_spans_elements
  command: 'set -- ab ba; echo "${*/a*a/X}"'
  stdout: "ab ba\n"
  stderr: ""
  exit_code: 0

- name: star_view_casemod_empty_ifs
  command: 'IFS=; set -- foo bar; echo "${*^}"'
  stdout: "FooBar\n"
  stderr: ""
  exit_code: 0

- name: at_view_heredoc_casemod_per_element
  command: |
    set -- p q; cat <<EOF
    ${@^} ${*^}
    EOF
  stdout: "P Q P Q\n"
  stderr: ""
  exit_code: 0

- name: at_view_heredoc_anchored_subst_per_element
  command: |
    set -- abc abd; cat <<EOF
    ${@/#ab/X}
    EOF
  stdout: "Xc Xd\n"
  stderr: ""
  exit_code: 0

