  stderr: ""
  exit_code: 0

- name: braceexp_composite_off
  command: "set +B; x=F; echo \"$x\"{1,2}"
  stdout: "F{1,2}\n"
  stderr: ""
  exit_code: 0

- name: braceexp_set_own_args_expand_with_old_state
  command: "set +B {a,b}; echo \"$#:$1\""
  stdout: "2:a\n"
  stderr: ""
  exit_code: 0

- name: braceexp_pipeline_set_discarded
  command: "set +B | cat; echo {a,b}"
  stdout: "a b\n"
  stderr: ""
  exit_code: 0

- name: braceexp_mid_line_toggle
  command: "echo {a,b}; set +B; echo {a,b}"
  stdout: "a b\n{a,b}\n"
  stderr: ""
  exit_code: 0
