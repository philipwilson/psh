  exit_code: 0

- name: command_sub_exit_code
  command: '$(exit 42); echo $?'
  stdout: "0\n"
  stderr: ""
  exit_code: 0
  psh_only: true  # psh doesn't propagate exit from $(exit N) as $?

- name: command_sub_word_split
  command: 'echo $(echo "a   b   c")'
  stdout: "a b c\n"
  stderr: ""
  exit_code: 0

- name: command_sub_no_word_split_quoted
  command: 'echo "$(echo "a   b   c")"'
