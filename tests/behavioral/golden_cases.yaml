- name: star_view_casemod_upper_per_element
  command: 'set -- foo bar; echo "${*^}"'
  stdout: "Foo Bar\n"
  stderr: ""
  exit_code: 0

- name: star_view_casemod_lower_per_element
  command: 'set -- FOO BAR; echo "${*,}"'
  stdout: "fOO bAR\n"
  stderr: ""
  exit_code: 0

- name: star_view_subst_custom_ifs_keeps_separator
