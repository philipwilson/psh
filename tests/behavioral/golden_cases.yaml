- name: command_sub_dollar_paren
  command: 'echo $(echo hello)'
  stdout: "hello\n"
  stderr: ""
  exit_code: 0

- name: command_sub_backtick
  command: 'echo `echo hello`'
  stdout: "hello\n"
  stderr: ""
  exit_code: 0

- name: command_sub_nested
  command: 'echo $(echo $(echo deep))'
