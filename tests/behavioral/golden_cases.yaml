  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_leading_number_resets_all_operands
  command: "trap 'echo A' INT; trap 'echo B' TERM; trap 2 15; trap -p; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_single_name_operand_resets
  command: "trap 'echo X' INT; trap INT; trap -p; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_winch_registers_lists_resets
  command: "trap 'echo w' WINCH; trap -p; trap - WINCH; trap -p; echo done"
  stdout: "trap -- 'echo w' SIGWINCH\ndone\n"
  stderr: ""
  exit_code: 0

- name: trap_p_unknown_signal_errors
  command: "trap -p NOSUCHSIG; echo rc=$?"
  stdout: "rc=1\n"
  stderr: "invalid signal specification"
  exit_code: 0

- name: trap_listing_numeric_order
  command: "trap true CHLD; trap true INT; trap true EXIT; trap"
  stdout: "trap -- 'true' EXIT\ntrap -- 'true' SIGINT\ntrap -- 'true' SIGCHLD\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_child_runs_own_exit_trap
  command: "x=$(trap 'echo inner' 0); echo \"x=$x\""
  stdout: "x=inner\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# COMMAND POSITION AFTER '&' (reappraisal #15 A2): '&' and '|&' are statement
# separators — reserved words, [[, and ! keep command position after them
# =============================================================================

- name: amp_then_if_statement
  command: "true & if true; then echo B; fi; wait"
  stdout: "B\n"
  stderr: ""
  exit_code: 0

- name: amp_then_case_statement
  command: "true & case x in x) echo C;; esac; wait"
  stdout: "C\n"
  stderr: ""
  exit_code: 0

- name: amp_then_double_bracket
  command: "true & [[ -n x ]] && echo X; wait"
  stdout: "X\n"
  stderr: ""
  exit_code: 0

- name: amp_then_bang_negation
  command: "true & ! false && echo NOT; wait"
