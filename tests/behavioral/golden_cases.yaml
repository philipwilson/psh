- name: declare_f_roundtrip_quoted_heredoc_delim
  command: "f() { cat <<'EOF'\nliteral $x\nEOF\n}\nsrc=$(declare -f f); unset -f f; eval \"$src\"; f"
  stdout: "literal $x\n"
  stderr: ""
  exit_code: 0

- name: type_function_with_case_no_crash
