  stderr: ""
  exit_code: 0

- name: param_prefix_strip_greedy
  command: 'path=/usr/local/bin; echo ${path##*/}'
  stdout: "bin\n"
  stderr: ""
  exit_code: 0

- name: prefix_names_quoted_at_field_splits
  command: 'x1=a; x2=b; set -- "${!x@}"; echo $#'
  stdout: "2\n"
  stderr: ""
  exit_code: 0

- name: prefix_names_quoted_at_printf
