# =============================================================================
# TRAP ACTIONS (reappraisal #17 Tier-2: control flow in traps, $BASH_COMMAND,
# RETURN trap — truth tables in tmp/probes-r17t2-trap/, bash 5.2)
# =============================================================================

- name: trap_return_in_signal_trap_returns_from_function
  command: 'f() { trap "echo t; return 9" USR1; kill -USR1 $$; echo after; }; f; echo rc=$?'
  stdout: "t\nrc=9\n"
  stderr: ""
  exit_code: 0

- name: trap_break_in_signal_trap_exits_loop_status_0
  command: 'trap "break" USR1; i=0; while true; do i=$((i+1)); test $i -eq 2 && kill -USR1 $$; test $i -gt 5 && break; done; echo i=$i rc=$?'
  stdout: "i=2 rc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_continue_in_signal_trap_skips_iteration
  command: 'trap "continue" USR1; for i in 1 2 3; do test $i = 2 && kill -USR1 $$; echo i=$i; done; echo rc=$?'
  stdout: "i=1\ni=3\nrc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_return_in_trap_innermost_function_only
  command: 'g() { kill -USR1 $$; echo g-after; }; f() { trap "return 4" USR1; g; echo f-after; }; f; echo rc=$?'
  stdout: "f-after\nrc=0\n"
  stderr: ""
  exit_code: 0

- name: trap_break2_in_trap_breaks_both_loops
  command: 'trap "break 2" USR1; for i in 1 2; do for j in a b; do test $j = a && kill -USR1 $$; echo $i$j; done; echo outer-$i; done; echo rc=$?'
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

