# =============================================================================
# REDIRECTIONS
# =============================================================================

- name: redirect_stdout_to_stderr
  command: 'echo hello >&2'
  stdout: ""
  stderr: "hello"
  exit_code: 0

# H1 (appraisal #16, a regression from Cluster C): `n>&m` makes fd n a snapshot
# of m's CURRENT target; a later `m>...` reassigns m without disturbing n. The
# builtin's own output must follow fd n's snapshot, not an alias of the stream
# object (which the later redirect clobbers).
- name: redirect_dup_source_reassigned
  command: 'echo hi 1>&2 2>/dev/null'
  stdout: ""
  stderr: "hi"
  exit_code: 0

- name: redirect_swap_idiom_builtin
  command: 'echo hi 3>&1 1>&2 2>&3 3>&-'
  stdout: ""
  stderr: "hi"
  exit_code: 0

# `exec 1>&-` closes fd 1 permanently: a builtin write then fails with EBADF
# (bash: write error), and fd 1 is NOT reopened by an unrelated redirect...
- name: redirect_exec_close_stdout_then_builtin
  command: 'exec 1>&-; echo hi'
  stdout: ""
  stderr: "write error: Bad file descriptor"
  exit_code: 1

# ...but a redirect that REOPENS fd 1 (here `1>&2`) makes the builtin write land.
- name: redirect_exec_close_then_reopen_fd1
  command: 'exec 1>&-; echo a 1>&2'
  stdout: ""
  stderr: "a"
  exit_code: 0

# Ledger #16(a): a REDIRECTED function/compound body after `exec 1>&-` must
# not leak stdout. The temporary `2>...` backs up fd 2; the backup must go to a
# high fd, or it lands in the freed fd-1 slot the stale sys.stdout still names,
# so the body echo writes OUT there (the real stderr) instead of failing EBADF.
# Diagnostic routed to /dev/null so the leak is the ONLY thing left on stderr.
- name: redirect_exec_close_func_body_no_leak
  command: 'exec 1>&-; f(){ echo OUT; }; f 2>/dev/null'
  stdout: ""
  stderr: ""
  exit_code: 1

- name: redirect_exec_close_nested_func_no_leak
  command: 'exec 1>&-; g(){ echo INNER; }; f(){ g; echo OUTER; }; f 2>/dev/null'
  stdout: ""
  stderr: ""
  exit_code: 1

- name: redirect_exec_close_brace_group_no_leak
  command: 'exec 1>&-; { echo OUT; } 2>/dev/null'
  stdout: ""
  stderr: ""
  exit_code: 1

# The reopen case for a function: `f 1>&2` re-points fd 1 at fd 2, so the
# body's stdout write DOES land (on the real stderr). Guards against
# over-severing when the high-fd backup is in play.
- name: redirect_exec_close_func_reopen_fd1
  command: 'exec 1>&-; f(){ echo a; }; f 1>&2'
  stdout: ""
  stderr: "a"
  exit_code: 0

# MED-1 (io_redirect appraisal 2026-07-07): a builtin's write to a std fd
# closed by permanent `exec >&-` must NEVER resurface when that fd is later
# reopened. Before the fix the natural TextIOWrapper buffered LEAK and flushed
# it into the reopened fd at shutdown; bash prints only `end`. Saved-fd reopen:
- name: ioleak_exec_close_reopen_echo
  command: 'exec 3>&1; exec >&-; echo LEAK; exec >&3 3>&-; echo end'
  stdout: "end\n"
  stderr: "write error: Bad file descriptor"
  exit_code: 0

- name: ioleak_exec_close_reopen_printf
  command: 'exec 3>&1; exec >&-; printf LEAK; exec >&3 3>&-; echo end'
  stdout: "end\n"
  stderr: "write error: Bad file descriptor"
  exit_code: 0

# Several builtins between close and reopen: none may resurface.
- name: ioleak_exec_close_multi_builtin
  command: 'exec 3>&1; exec >&-; echo A; echo B; printf C; exec >&3 3>&-; echo end'
  stdout: "end\n"
  stderr: "write error: Bad file descriptor"
  exit_code: 0

# The "healing" reopen the old docstring wrongly called safe: close fd 1,
# write, point fd 1 at fd 2. Nothing leaks onto fd 2 (stdout stays empty; the
# stderr no-LEAK assertion is pinned in test_exec_close_output_leak.py).
- name: ioleak_exec_close_heal_to_stderr
  command: 'exec 3>&1; exec 1>&-; echo LEAK; exec 1>&2; echo end >&2'
  stdout: ""
  stderr: null
  exit_code: 0

# Close, reopen, close again, reopen: no accumulation across cycles.
- name: ioleak_exec_double_close_reopen
  command: 'exec 3>&1; exec >&-; echo L1; exec >&3; echo mid; exec >&-; echo L2; exec >&3 3>&-; echo end'
  stdout: "mid\nend\n"
  stderr: "write error: Bad file descriptor"
  exit_code: 0

# Cluster C1 (appraisal #15): a redirect on an in-process builtin reaches
# the children it spawns (external command / pipeline / sourced file).
- name: redirect_command_external_devnull_no_leak
  command: 'command ls / > /dev/null; echo done'
  stdout: "done\n"
  stderr: ""
  exit_code: 0

- name: redirect_eval_external_stderr_suppressed
  command: 'eval "ls /nonexistent_zz" 2>/dev/null; echo rc=$?'
  stdout: "rc=1\n"
  stderr: ""
  exit_code: 0

- name: redirect_command_builtin_pipe
  command: 'command echo hi | cat'
  stdout: "hi\n"
  stderr: ""
  exit_code: 0

# Cluster C3 (appraisal #15): a bad redirect target on a compound command
# prints a diagnostic, does NOT run the body, fails with status 1 (so
# `|| fallback` runs) and restores the shell's fds — matching bash.
- name: redirect_compound_brace_bad_fallback
  command: '{ echo a; } > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_if_bad_fallback
  command: 'if true; then echo a; fi > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_for_bad_fallback
  command: 'for i in 1 2; do echo $i; done > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_dbracket_bad_fallback
  command: '[[ 1 == 1 ]] > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_arith_bad_fallback
  command: '(( 1 + 1 )) > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_case_bad_fallback
  command: 'case x in x) echo a;; esac > /nonexistent_zz/x || echo fallback'
  stdout: "fallback\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_brace_bad_status_one
  command: '{ echo a; } > /nonexistent_zz/x; echo rc=$?'
  stdout: "rc=1\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

- name: redirect_compound_bad_in_if_condition
  command: 'if { echo a; } > /nonexistent_zz/x; then echo then; else echo else; fi'
  stdout: "else\n"
  stderr: "/nonexistent_zz/x"
  exit_code: 0

# Reappraisal #16 Tier-2 (I/O): fd-move `[n]>&m-` = dup m onto n, close source.
- name: redirect_fd_move_closes_source
  command: 'echo x 3>&1-'
  stdout: ""
  stderr: "write error"
  exit_code: 1

# Move onto self (`1>&1-`) is a no-op that keeps the fd open (bash).
- name: redirect_fd_move_to_self_keeps_fd
  command: 'echo x 1>&1-; echo y'
  stdout: "x\ny\n"
  stderr: ""
  exit_code: 0

# Move preserves the target fd; source is closed.
- name: redirect_fd_move_preserves_target
  command: 'cd "$(mktemp -d)"; exec 3>f; exec 4>&3-; echo hi >&4; cat f'
  stdout: "hi\n"
  stderr: ""
  exit_code: 0

# csh-style `>&word` (fd omitted, non-numeric word) == `&>word`.
- name: redirect_csh_combined_to_file
  command: 'cd "$(mktemp -d)"; echo hi >&gc; cat gc'
  stdout: "hi\n"
  stderr: ""
  exit_code: 0

# A digit-prefixed non-numeric word is one filename, not a dup + argument.
- name: redirect_csh_combined_digit_prefixed
  command: 'cd "$(mktemp -d)"; echo hi >&2x; cat 2x'
  stdout: "hi\n"
  stderr: ""
  exit_code: 0

# A failed exec redirection list is rolled back all-or-nothing: fd 3 does not
# survive, so `echo rc=$?` reports the failure and the shell continues.
- name: redirect_exec_partial_failure_rolls_back
  command: 'cd "$(mktemp -d)"; exec 3>ok 4>/nonexistent/x; echo rc=$?'
  stdout: "rc=1\n"
  stderr: "No such file or directory"
  exit_code: 0

# Trailing `\c` in a $'...' string stays literal (bash finds the closing quote
# before decoding escapes) — reappraisal #16 Tier-2 (lexer).
- name: ansi_c_trailing_control_escape_literal
  command: "printf '[%s]' $'x\\c'"
  stdout: "[x\\c]"
  stderr: ""
  exit_code: 0

# echo -e / printf %b escape dialects — reappraisal #17 M3.
# (a) escapes BEFORE \c are processed; the old scanner returned the raw prefix.
- name: echo_e_escapes_before_backslash_c
  command: "echo -e 'a\\tb\\cd'"
  stdout: "a\tb"
  stderr: ""
  exit_code: 0

- name: printf_percent_b_escapes_before_backslash_c
  command: "printf '%b' 'x\\ny\\cz'"
  stdout: "x\ny"
  stderr: ""
  exit_code: 0

- name: echo_e_double_backslash_c_is_literal
  command: "echo -e 'x\\\\cy'"
  stdout: "x\\cy\n"
  stderr: ""
  exit_code: 0

# (b) octal dialects: %b takes the bare POSIX \ddd form; echo -e REQUIRES
# the leading zero (\0ddd) and leaves \ddd literal.
- name: printf_percent_b_bare_octal
  command: "printf '%b.%b\\n' '\\41' '\\101'"
  stdout: "!.A\n"
  stderr: ""
  exit_code: 0

- name: echo_e_octal_requires_leading_zero
  command: "echo -e '\\101'; echo -e '\\0101'"
  stdout: "\\101\nA\n"
  stderr: ""
  exit_code: 0

# \u accepts short forms (1-4 hex digits) in all three escape dialects.
- name: escape_unicode_short_form_all_dialects
  command: "printf '\\u41'; printf '%b' '\\u41'; echo -e '\\u41'"
  stdout: "AAA\n"
  stderr: ""
  exit_code: 0

# In the printf FORMAT string, \% emits '\' and the '%' then fails
# conversion parsing ("missing format character", exit 1) — bash 5.2.
- name: printf_format_backslash_percent
  command: "printf '\\%'"
  stdout: "\\"
  stderr: "missing format character"
  exit_code: 1

