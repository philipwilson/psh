- name: amp_then_bang_negation
  command: "true & ! false && echo NOT; wait"
  stdout: "NOT\n"
  stderr: ""
  exit_code: 0

- name: pipe_amp_then_if_statement
  command: "true |& if true; then echo PA; fi"
  stdout: "PA\n"
  stderr: ""
  exit_code: 0

- name: amp_directly_before_closing_fi
  command: "if true; then echo hi & fi; wait"
