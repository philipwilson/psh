# =============================================================================
# COMMAND SUBSTITUTION vs ERREXIT (reappraisal #15 F1)
# bash clears set -e in $( ) / ` ` children unless POSIX mode or
# shopt -s inherit_errexit; ( ) subshells and <(...) inherit it.
# =============================================================================

- name: cmdsub_resets_errexit
  command: 'set -e; x=$(false; echo hi); echo "x=$x after"'
  stdout: "x=hi after\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_backticks_reset_errexit
  command: 'set -e; x=`false; echo hi`; echo "x=$x after"'
  stdout: "x=hi after\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_child_dollar_dash_loses_e
  command: 'set -e; x=$(echo $-); case $x in *e*) echo has_e;; *) echo no_e;; esac'
  stdout: "no_e\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_status_still_drives_parent_errexit
  command: 'set -e; x=$(false; echo hi; exit 5); echo "x=$x after"'
  stdout: ""
  stderr: ""
  exit_code: 5

- name: cmdsub_inherit_errexit_child_aborts
  command: 'shopt -s inherit_errexit; set -e; x=$(false; echo hi); echo "x=$x after"'
  stdout: ""
  stderr: ""
  exit_code: 1

- name: cmdsub_posix_mode_keeps_errexit
  command: 'set -o posix; set -e; x=$(false; echo hi); echo "x=$x after"'
  stdout: ""
  stderr: ""
  exit_code: 1

- name: cmdsub_errexit_suppression_crosses_fork
  command: 'set -e; if x=$(set -e; false; echo no); then echo "t:$x"; else echo f; fi; echo after'
  stdout: "t:no\nafter\n"
  stderr: ""
  exit_code: 0

- name: subshell_still_inherits_errexit
  command: 'set -e; (false; echo no); echo after'
  stdout: ""
  stderr: ""
  exit_code: 1

- name: procsub_still_inherits_errexit
  command: 'set -e; cat <(false; echo hi); echo after'
  stdout: "after\n"
  stderr: ""
  exit_code: 0

- name: procsub_errexit_suppression_crosses_fork
  command: 'set -e; if cat <(false; echo hi); then echo t; fi; echo after'
  stdout: "hi\nt\nafter\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# FUNCTION NAMES & BREAK/CONTINUE AS BUILTINS (appraisal #15 D2) — bash-valid
# function names (builtin names, dashes, dots) work; functions shadow builtins
# (even POSIX special ones, bash default mode); break/continue/return are
# ordinary builtins, so their redirects apply and they compose in
# pipelines/lists. stderr wording differs by shell where non-empty.
# =============================================================================

- name: function_named_true_shadows_builtin
  command: "true(){ echo custom; }; true"
  stdout: "custom\n"
  stderr: ""
  exit_code: 0

- name: function_named_exit_shadows_special_builtin
  command: "exit(){ echo no-exit; }; exit; echo still-here"
  stdout: "no-exit\nstill-here\n"
  stderr: ""
  exit_code: 0

- name: builtin_exit_bypasses_exit_function
  command: "exit(){ echo no-exit; }; builtin exit 3; echo unreached"
  stdout: ""
  stderr: ""
  exit_code: 3

- name: dashed_function_name
  command: "my-func(){ echo dash; }; my-func"
  stdout: "dash\n"
  stderr: ""
  exit_code: 0

- name: dotted_function_name
  command: "f.g(){ echo fg; }; f.g"
  stdout: "fg\n"
  stderr: ""
  exit_code: 0

- name: unset_f_reveals_builtin_again
  command: "true(){ echo custom; }; unset -f true; true; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: reserved_word_function_name_is_syntax_error
  command: "if(){ :; }"
  stdout: ""
  stderr: "syntax error"
  exit_code: 2

- name: function_keyword_form_accepts_any_name
  command: "function my-func { echo kwdash; }; my-func"
  stdout: "kwdash\n"
  stderr: ""
  exit_code: 0

- name: break_function_shadows_builtin_in_loop
  command: "break(){ echo custom-break; }; for i in 1 2; do break; done; echo after-$i"
  stdout: "custom-break\ncustom-break\nafter-2\n"
  stderr: ""
  exit_code: 0

- name: break_redirect_suppresses_warning
  command: "break 2>/dev/null; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: break_outside_loop_composes_with_and
  command: "break && echo yes"
  stdout: "yes\n"
  stderr: "break: only meaningful"
  exit_code: 0

- name: break_in_pipeline_outside_loop
  command: "break | cat; echo rc=$?"
  stdout: "rc=0\n"
  stderr: "break: only meaningful"
  exit_code: 0

- name: break_in_pipeline_inside_loop_is_silent_noop
  command: "for i in 1 2; do break | cat; echo in-$i; done; echo after"
  stdout: "in-1\nin-2\nafter\n"
  stderr: ""
  exit_code: 0

- name: command_break_bypasses_break_function
  command: "break(){ echo custom; }; for i in 1 2; do command break; echo in-$i; done; echo after"
  stdout: "after\n"
  stderr: ""
  exit_code: 0

- name: break_in_while_condition_exits_loop
  command: "while break; do echo body; done; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

- name: cmdsub_break_inside_loop_is_silent
  command: "for i in 1; do x=$(break); echo after-$i; done"
  stdout: "after-1\n"
  stderr: ""
  exit_code: 0

- name: variable_expanding_to_break_runs_builtin
  command: "c=break; for i in 1 2; do $c; echo in-$i; done; echo after"
  stdout: "after\n"
  stderr: ""
  exit_code: 0

- name: return_too_many_arguments_aborts
  command: "f(){ return 1 2; echo in; }; f; echo rc=$?"
  stdout: ""
  stderr: "return: too many arguments"
  exit_code: 1

# =============================================================================
# UNSET DYNAMIC-SCOPE SEMANTICS (reappraisal #15 D1)
# bash keeps a per-name stack; unset removes the most recent instance,
# revealing the next-outer one — except a local unset in its own declaring
# scope, which stays "local and unset" there.
# =============================================================================

- name: unset_global_in_fn_then_assign_writes_global
  command: 'x=1; f(){ unset x; x=new; }; f; echo "[${x-U}]"'
  stdout: "[new]\n"
  stderr: ""
  exit_code: 0

- name: unset_callers_local_reveals_global
  command: 'x=global; f(){ local x=f; g; }; g(){ unset x; echo "[${x-U}]"; }; f'
  stdout: "[global]\n"
  stderr: ""
  exit_code: 0

- name: unset_callers_local_then_assign_writes_global
  command: 'x=global; f(){ local x=f; g; echo f:$x; }; g(){ unset x; x=setbyg; }; f; echo top:$x'
  stdout: "f:setbyg\ntop:setbyg\n"
  stderr: ""
  exit_code: 0

- name: unset_own_local_stays_local_unset
  command: 'x=1; f(){ local x=2; unset x; echo "[${x-U}]"; }; f; echo "top:[$x]"'
  stdout: "[U]\ntop:[1]\n"
  stderr: ""
  exit_code: 0

- name: unset_three_deep_pops_one_instance_each
  command: 'x=global; f(){ local x=f; g; }; g(){ local x=g; h; }; h(){ unset x; echo "1:[${x-U}]"; unset x; echo "2:[${x-U}]"; unset x; echo "3:[${x-U}]"; }; f; echo "top:[${x-U}]"'
  stdout: "1:[f]\n2:[global]\n3:[U]\ntop:[U]\n"
  stderr: ""
  exit_code: 0

- name: unset_child_assign_binds_callers_unset_local
  command: 'x=global; f(){ local x=f; unset x; g; echo "f:[${x-U}]"; }; g(){ x=setbyg; }; f; echo "top:[$x]"'
  stdout: "f:[setbyg]\ntop:[global]\n"
  stderr: ""
  exit_code: 0

- name: unset_deeper_scope_removes_callers_unset_local
  command: 'x=global; f(){ local x=f; unset x; g; }; g(){ unset x; echo "g:[${x-U}]"; }; f; echo "top:[${x-U}]"'
  stdout: "g:[global]\ntop:[global]\n"
  stderr: ""
  exit_code: 0

- name: unset_strips_local_attributes
  command: 'f(){ local -i x=5; unset x; declare -p x; x=3+4; echo "[$x]"; }; f'
  stdout: "declare -- x\n[3+4]\n"
  stderr: ""
  exit_code: 0

- name: unset_own_local_declare_p_shows_declaration
  command: 'x=1; f(){ local x=2; unset x; declare -p x; echo rc=$?; }; f'
  stdout: "declare -- x\nrc=0\n"
  stderr: ""
  exit_code: 0

- name: unset_bare_declare_global_removes_cell
  command: 'declare x; unset x; declare -p x 2>/dev/null; echo rc=$?'
  stdout: "rc=1\n"
  stderr: ""
  exit_code: 0

- name: unset_declare_g_after_unset_in_fn
  command: 'x=1; f(){ unset x; declare -g x=new2; }; f; echo "[${x-U}]"'
  stdout: "[new2]\n"
  stderr: ""
  exit_code: 0

- name: unset_readonly_refused_value_kept
  command: 'readonly r=1; f(){ unset r 2>/dev/null; echo rc=$?; }; f; echo "[$r]"'
  stdout: "rc=1\n[1]\n"
  stderr: ""
  exit_code: 0

# =============================================================================
# ANSI-C QUOTING IN ASSIGNMENT / CONCATENATION (reappraisal #15 J6)
# The value must decode identically whether $'...' is a standalone word or
# embedded in an assignment value / concatenation.
# =============================================================================

- name: ansi_c_scalar_assignment_value
  command: "v=$'a\\tb'; printf '%s' \"$v\""
  stdout: "a\tb"
  stderr: ""
  exit_code: 0

- name: ansi_c_concatenation_in_word
  command: "echo a$'b\\tc'd"
  stdout: "ab\tcd\n"
  stderr: ""
  exit_code: 0

- name: ansi_c_array_element_value
  command: "a=($'x\\ty'); printf '%s' \"${a[0]}\""
  stdout: "x\ty"
  stderr: ""
  exit_code: 0

- name: ansi_c_indexed_element_assignment
  command: "a[0]=$'p q'; printf '%s' \"${a[0]}\""
  stdout: "p q"
  stderr: ""
  exit_code: 0

- name: assoc_composite_value_keeps_quotes
  command: "declare -A m=([k]=$'a\\tb' [j]='p q'); printf '%s|%s' \"${m[k]}\" \"${m[j]}\""
  stdout: "a\tb|p q"
  stderr: ""
  exit_code: 0

# A quote in the NAME portion disqualifies the word as an assignment (bash):
# `v$'a'=x` runs the COMMAND `va=x`, it is not an assignment.
- name: quoted_name_part_is_not_assignment
  command: "v$'a'=x; echo \"v=[$v]\""
  stdout: "v=[]\n"
  stderr: "command not found"
  exit_code: 0

# =============================================================================
# REAPPRAISAL #16 H2/H4 (AST-node fixes)
# =============================================================================

# H2: an enhanced-test [[ ]] as the pipeline TAIL used to crash with an
# AttributeError (EnhancedTestStatement lacked the `background` field the
# PipelineExecutor reads off the last command). Now the [[ ]]'s truth value
# is the pipeline status, matching bash.
- name: enhanced_test_pipeline_tail
  command: "true | [[ -n y ]]; echo rc=$?"
  stdout: "rc=0\n"
  stderr: ""
  exit_code: 0

# H4: ${!prefix@} / ${!prefix*} (prefix-names) must survive declare -f
# serialization. The formatter used to render the bang as a suffix
# (${ab_!@}), turning the round-tripped function into a "bad substitution".
- name: prefix_names_declare_f_roundtrip
  command: 'f() { ab_x=1; ab_y=2; echo ${!ab_@}; }; src=$(declare -f f); unset -f f; eval "$src"; f'
  stdout: "ab_x ab_y\n"
  stderr: ""
  exit_code: 0

# H4: direct expansion of both prefix-names forms (unaffected by the fix, but
# pins the @/* pair against regression).
- name: prefix_names_both_forms
  command: "ab_x=1; ab_y=2; echo ${!ab_@}; echo ${!ab_*}"
  stdout: "ab_x ab_y\nab_x ab_y\n"
  stderr: ""
  exit_code: 0
