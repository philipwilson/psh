- name: patsub_nocasematch_all
  command: 'shopt -s nocasematch; v=ABC; echo "${v//a/X}"'
  stdout: "XBC\n"
  stderr: ""
  exit_code: 0

- name: patsub_nocasematch_prefix
  command: 'shopt -s nocasematch; v=ABC; echo "${v/#a/X}"'
  stdout: "XBC\n"
  stderr: ""
  exit_code: 0

- name: patsub_nocasematch_suffix
  command: 'shopt -s nocasematch; v=ABC; echo "${v/%c/X}"'
  stdout: "ABX\n"
  stderr: ""
