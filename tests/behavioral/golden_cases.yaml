- name: comment_starts_after_redirect_operator
  # bash: `#` right after a redirect operator begins a comment, so the
  # operator has no operand -> syntax error (exit 2). Message text differs.
  command: "echo x >#f"
  stdout: ""
  stderr: null
  exit_code: 2

