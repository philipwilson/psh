# =============================================================================
# Reappraisal #17 Tier-2: positional-$* per-element value operators (F1),
# tilde-prefix boundary at ':' + all-unquoted-literal requirement (F2/F3),
# and single-field protection through the ${a[*]:-...} view.
#
# F1: case-mod (^ ^^ , ,,) and substitution (/ // /# /%) on the positional
# $* / $@ views used to run on the IFS-joined string; bash applies them per
# element and joins after (the separator never participates in matching).
# F2/F3: bash delimits a leading tilde-prefix at the first unquoted '/' OR
# ':' and expands it only when the whole tilde word is unquoted literal.
# =============================================================================

- name: star_view_casemod_upper_per_element
  command: 'set -- foo bar; echo "${*^}"'
  stdout: "Foo Bar\n"
  stderr: ""
  exit_code: 0

- name: star_view_casemod_lower_per_element
  command: 'set -- FOO BAR; echo "${*,}"'
  stdout: "fOO bAR\n"
  stderr: ""
  exit_code: 0

- name: star_view_subst_custom_ifs_keeps_separator
  command: 'IFS=o; set -- fo of; echo "${*//o/_}"'
