[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = -v --tb=short --ignore=tests/performance

# A strict xfail that unexpectedly PASSES (XPASS) is a failure: when a feature
# behind an xfail gets implemented, the suite flags the stale marker for
# removal instead of silently passing. (The absent-feature ledger already
# relies on this per-test; making it the default closes the gap globally.)
xfail_strict = true

# Markers for categorizing tests
markers =
    # Existing markers
    interactive: tests that require pytest -s flag for stdin access (select statements)
    requires_stdin: tests that require pytest -s flag due to read builtin usage
    slow: tests that take longer to run
    integration: full integration tests
    visitor_xfail: tests expected to fail with visitor executor (experimental feature)
    # New markers for test reorganization
    performance: marks performance benchmarks
    conformance: marks bash conformance tests
    unit: marks unit tests
    system: marks system tests
    parser_differential: RD-vs-combinator parity fuzzer (nightly widens iters)
