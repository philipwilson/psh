[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options. (The old global `--ignore=tests/performance` is gone —
# campaign E1b: tests/performance is ordinary collected content. Its
# CPU/wall-time microbenchmarks carry the `benchmark` marker (plus `serial`)
# and are excluded from every standard-gate phase by run_tests.py; run them
# via `python run_tests.py --benchmarks`. Its deterministic large-input
# robustness tests run in the normal gate.)
addopts = --tb=short

# A strict xfail that unexpectedly PASSES (XPASS) is a failure: when a feature
# behind an xfail gets implemented, the suite flags the stale marker for
# removal instead of silently passing. (The absent-feature ledger already
# relies on this per-test; making it the default closes the gap globally.)
xfail_strict = true

# Markers for categorizing tests
markers =
    # Existing markers
    interactive: PTY/terminal-driven tests, auto-marked by path (tests/*/interactive/ outside unit/) in tests/conftest.py; skipped unless --run-interactive is given (the deterministic PTY smoke suite test_pty_smoke.py is exempt and always runs)
    slow: tests that take longer to run
    integration: full integration tests
    # New markers for test reorganization
    performance: tests under tests/performance/ (auto-marked by path)
    benchmark: CPU/wall-time microbenchmarks with timing thresholds; excluded from every standard-gate phase, run serially via `python run_tests.py --benchmarks` (campaign E1b)
    conformance: marks bash conformance tests
    unit: marks unit tests
    system: marks system tests
    serial: tests that must run serially (no parallel/xdist execution)
    parser_differential: RD-vs-combinator parity fuzzer (nightly widens iters)
