name: Tests CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check psh tests
      - run: mypy  # scope is driven by [tool.mypy] files in pyproject.toml

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The per-PR gate runs the FULL suite in parallel (pytest-xdist):
      # the not-serial phase under -n auto, then the serial phase. Coverage
      # is NOT collected here — it is non-gating reporting and lives in the
      # nightly run, keeping this gate fast (see nightly.yml).
      - name: Run Full Parallel Suite
        run: python run_tests.py --parallel

  conformance-smoke:
    name: Conformance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run POSIX Conformance Smoke
        run: python -m pytest tests/conformance/posix/test_posix_compliance.py -q
