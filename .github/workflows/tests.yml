name: Tests CI

# INTENTIONALLY NOT a per-PR gate. This workflow is disabled (state
# `disabled_manually`, via `gh workflow disable tests.yml`) because the project
# runs fast on a LOCAL gate: `python run_tests.py --parallel` + `ruff check psh
# tests` + `mypy` before every merge (see CLAUDE.md "Release workflow"). To keep
# the file honest about that, the triggers below are `workflow_dispatch` only —
# it will NOT auto-run on push/pull_request even if someone re-enables it; the
# push/PR triggers are commented out, not active. The nightly full+bash+coverage
# safety net (nightly.yml) and the auto-tagger (release-tag.yml) stay on.
#
# To restore per-PR CI: uncomment the push/pull_request block below AND run
# `gh workflow enable tests.yml`.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check psh tests
      - run: mypy  # scope is driven by [tool.mypy] files in pyproject.toml

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The per-PR gate runs the FULL suite in parallel (pytest-xdist):
      # the not-serial phase under -n auto, then the serial phase. Coverage
      # is NOT collected here — it is non-gating reporting and lives in the
      # nightly run, keeping this gate fast (see nightly.yml).
      - name: Run Full Parallel Suite
        run: python run_tests.py --parallel

  conformance-smoke:
    name: Conformance Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run POSIX Conformance Smoke
        run: python -m pytest tests/conformance/posix/test_posix_compliance.py -q
