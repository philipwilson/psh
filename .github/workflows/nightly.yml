name: Nightly Full Suite

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch: {}   # manual runs for testing the workflow itself

jobs:
  full-suite:
    name: Full Parallel Suite + Bash Golden Comparison
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show bash version
        run: bash --version

      # --compare-bash adds the golden bash-comparison phase (Phase 2) to
      # the same run, so the full suite and the golden phase share one
      # invocation; --census logs the skip/xfail breakdown nightly.
      # --coverage accumulates one coverage db across all phases and writes
      # coverage.xml. Coverage is non-gating reporting (no --cov-fail-under);
      # it moved here from the per-PR gate (v0.330.0) to keep that gate fast.
      - name: Run Full Parallel Suite (with bash golden phase + coverage)
        run: python run_tests.py --parallel --compare-bash --census --coverage

      # Extended RD-vs-combinator parser differential. The full suite above
      # already runs this fuzzer at its fast default (150 snippets); here we
      # widen it enormously and rotate the seed per run so coverage of the
      # grammar accumulates over nightly runs. The seed is echoed (and embedded
      # in any failure message) so a divergence reproduces with a one-liner.
      - name: RD-vs-Combinator Parser Differential (extended fuzz)
        env:
          PSH_DIFFERENTIAL_SEED: ${{ github.run_number }}
          PSH_DIFFERENTIAL_ITERS: "40000"
        run: |
          echo "differential seed=$PSH_DIFFERENTIAL_SEED iters=$PSH_DIFFERENTIAL_ITERS"
          python -m pytest -p no:cacheprovider -o addopts="" \
            tests/parser_differential/test_combinator_random_differential.py

      # Benchmark tier (campaign E1b, integrator ruling R2 at the E1 bounce):
      # `benchmark`-marked timing microbenchmarks, serial, excluded from the
      # standard gate. Nightly records the transcript as a build artifact
      # ONLY — baseline-delta tracking is deferred to campaign exit.
      - name: Benchmark Tier (serial; artifact-only, no baseline deltas)
        run: python run_tests.py --benchmarks --results-file tmp/benchmarks-nightly.txt

      - name: Upload Benchmark Transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-transcript
          path: tmp/benchmarks-nightly.txt
          if-no-files-found: warn

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  conformance:
    name: Full Conformance Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show bash version
        run: bash --version

      - name: Run Full Conformance Suite (POSIX + bash compatibility)
        working-directory: tests/conformance
        run: python run_conformance_tests.py
