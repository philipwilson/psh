    "psh/expansion/pattern.py",
    "psh/expansion/aliases.py",
    "psh/expansion/brace_expansion.py",
    "psh/expansion/command_sub.py",
    "psh/expansion/evaluator.py",
    "psh/expansion/extglob.py",
    "psh/expansion/glob.py",
    "psh/expansion/manager.py",
    "psh/expansion/param_parser.py",
    "psh/expansion/parameter_expansion.py",
    "psh/expansion/tilde.py",
    "psh/expansion/variable.py",
    "psh/expansion/_protocols.py",
    "psh/expansion/arrays.py",
    "psh/expansion/fields.py",
    "psh/expansion/operands.py",
    "psh/expansion/operators.py",
    "psh/expansion/word_expander.py",
    "psh/expansion/word_splitter.py",
    # I/O redirection (annotation-clean modules)
