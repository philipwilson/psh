[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "psh"
dynamic = ["version"]
description = "Python Shell (psh) - An educational Unix shell implementation"
readme = "README.md"
authors = [
    {name = "Philip Wilson", email = "pgw@acm.org"}
]
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Education",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Education",
    "Topic :: System :: Shells",
]
keywords = ["shell", "unix", "education", "interpreter", "command-line"]
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "pytest-xdist",
    "pyyaml",   # tests/behavioral golden-case loader
    "pexpect",  # tests/system/interactive PTY tier (collection-time import)
]

[project.urls]
Homepage = "https://github.com/philipwilsonTHG/psh"
Repository = "https://github.com/philipwilsonTHG/psh"
Issues = "https://github.com/philipwilsonTHG/psh/issues"

[project.scripts]
psh = "psh.__main__:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["psh", "psh.*"]

[tool.setuptools.package-data]
psh = ["*.md"]

[tool.setuptools.dynamic]
version = {attr = "psh.version.__version__"}

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "F401",   # unused imports
    "F811",   # redefined while unused
    "F841",   # unused variables
    "I",      # import sorting
    "W",      # pycodestyle warnings (whitespace, trailing, etc.)
]

[tool.ruff.lint.per-file-ignores]
# __init__.py files use side-effect imports for registration
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["psh"]

[tool.mypy]
# Minimal, non-strict adoption: the `files` list below is the checked scope.
# Grow it module-by-module as annotations are cleaned up; keep new core/ code clean.
python_version = "3.12"
files = [
    "psh/core",
    "psh/ast_nodes.py",
    "psh/shell.py",
    "psh/version.py",
    "psh/expansion/pattern.py",
    "psh/utils/escapes.py",
    "psh/interactive/line_layout.py",
    "psh/interactive/edit_buffer.py",
    "psh/interactive/line_renderer.py",
    "psh/interactive/key_decoder.py",
]
ignore_missing_imports = true
follow_imports = "silent"
allow_untyped_defs = true
allow_incomplete_defs = true
check_untyped_defs = false
warn_unused_ignores = true
