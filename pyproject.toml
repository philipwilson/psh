    "psh/parser/combinators/tokens.py",
    "psh/parser/combinators/utils.py",
    "psh/parser/combinators/heredoc_processor.py",
    "psh/parser/combinators/expansions.py",
    "psh/parser/combinators/special_commands.py",
    "psh/parser/combinators/commands/_constants.py",
    "psh/parser/combinators/commands/_protocols.py",
    "psh/parser/combinators/commands/redirections.py",
    "psh/parser/combinators/commands/simple.py",
    "psh/parser/combinators/commands/pipelines.py",
    "psh/parser/combinators/commands/statements.py",
    "psh/parser/combinators/commands/__init__.py",
    "psh/parser/combinators/parser.py",
    "psh/parser/combinators/__init__.py",
    "psh/parser/combinators/control_structures/_protocols.py",
    "psh/parser/combinators/control_structures/loops.py",
    "psh/parser/combinators/control_structures/conditionals.py",
    "psh/parser/combinators/control_structures/structures.py",
    "psh/parser/combinators/control_structures/__init__.py",
    # Builtins: whole package (directory entry, not file-by-file) so a new
    # builtin is type-checked automatically — the old enumeration let
    # loop_control.py escape the gate (reappraisal #16 Tier-2).
    "psh/builtins",
