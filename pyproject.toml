    "psh/io_redirect/file_redirect.py",
    "psh/io_redirect/process_sub.py",
    "psh/io_redirect/manager.py",
    "psh/io_redirect/__init__.py",
    # Utils (annotation-clean modules)
    "psh/utils/__init__.py",
    "psh/utils/escapes.py",
    "psh/utils/ast_debug.py",
    "psh/utils/file_tests.py",
    "psh/utils/heredoc_detection.py",
