    "psh/parser/recursive_descent/context.py",
    "psh/parser/recursive_descent/helpers.py",
    "psh/parser/recursive_descent/support/utils.py",
    "psh/parser/recursive_descent/support/context_factory.py",
    "psh/parser/recursive_descent/support/word_builder.py",
    # Whole package (directory entry, not file-by-file) so a new sub-parser is
    # type-checked automatically — the old enumeration let base.py escape the
    # gate (reappraisal #16 Tier-2).
